<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: transparent;
  font-family: Arial, sans-serif;
  color: #f5f5f5;
  text-align: center;
}

.board {
  background: #050505;
  border: 2px solid #ffd700;
  border-radius: 18px;
  padding: 12px;
  box-shadow: 0 0 14px #ffd700;
}

h2 {
  color: #ffd700;
  margin: 5px 0 12px;
  font-size: 20px;
  text-shadow: 0 0 8px #ffd700;
}

.member {
  background: rgba(255, 215, 0, 0.08);
  border: 1px solid rgba(255, 215, 0, 0.55);
  border-radius: 10px;
  padding: 8px;
  margin: 8px 0;
}

a {
  color: #ffd700;
  text-decoration: none;
  font-weight: bold;
}

.small {
  color: #cccccc;
  font-size: 11px;
  margin-top: 3px;
}
</style>
</head>

<body>

<div class="board">
  <h2>👑 Newest Members</h2>
  <div id="members">Loading newest members...</div>
</div>

<script>
const clubSlug = "and-chess-for-all-1";

fetch("https://api.chess.com/pub/club/" + clubSlug + "/members")
  .then(response => response.json())
  .then(data => {
    let members = [];

    if (data.weekly) members = members.concat(data.weekly);
    if (data.monthly) members = members.concat(data.monthly);
    if (data.all_time) members = members.concat(data.all_time);

    members = members
      .filter((member, index, self) =>
        index === self.findIndex(m => m.username === member.username)
      )
      .sort((a, b) => b.joined - a.joined)
      .slice(0, 5);

    if (members.length === 0) {
      document.getElementById("members").innerHTML = "No members found.";
      return;
    }

    document.getElementById("members").innerHTML = members.map(member => {
      const date = member.joined
        ? new Date(member.joined * 1000).toLocaleDateString()
        : "Recently";

      return `
        <div class="member">
          👋 Welcome<br>
          <a href="https://www.chess.com/member/${ultimateblundermaster22}" target="_blank">
            @${UltimateBlunderMaaster22}
          </a>
          <div class="small">Joined ${6/10/2026}</div>
        </div>
      `;
    }).join("");
  })
  .catch(() => {
    document.getElementById("members").innerHTML =
      "Unable to load members.";
  });
</script>

</body>
</html>
